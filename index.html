<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PRM File Tracking System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}
.sidebar{
    width:250px;
    height:100vh;
    position:fixed;
    background:#0d6efd;
    color:#fff;
    padding-top:20px;
}
.sidebar h4{
    text-align:center;
}
.sidebar a{
    color:#fff;
    display:block;
    padding:10px 20px;
    text-decoration:none;
}
.sidebar a:hover{
    background:rgba(255,255,255,.2);
}
.content{
    margin-left:260px;
    padding:20px;
}
.card{
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}
</style>
</head>

<body>

<div class="sidebar">
    <h4>PRM System</h4>
    <a href="#">Dashboard</a>
    <a href="#">File Registration</a>
</div>

<div class="content">

    <h2>फेदीखोला गाउँपालिका</h2>
    <p>PRM File Tracking System</p>

    <div class="row mb-3">

        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h6>Total Files</h6>
                    <h2 id="totalFiles">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h6>Pending</h6>
                    <h2 id="pendingFiles">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h6>Completed</h6>
                    <h2 id="completedFiles">0</h2>
                </div>
            </div>
        </div>

    </div>

    <div class="card mb-4">
        <div class="card-header bg-primary text-white">
            File Registration
        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-2">
                    <input type="text" id="fileNo" class="form-control" readonly>
                </div>

                <div class="col-md-4">
                    <input type="text" id="subject" class="form-control" placeholder="Subject">
                </div>

                <div class="col-md-3">
                    <input type="text" id="applicant" class="form-control" placeholder="Applicant Name">
                </div>

                <div class="col-md-3">
                    <input type="text" id="mobile" class="form-control" placeholder="Mobile">
                </div>

            </div>

            <div class="row mt-3">

                <div class="col-md-4">
                    <select id="branch" class="form-select">
                        <option>प्रशासन शाखा</option>
                        <option>पूर्वाधार विकास शाखा</option>
                        <option>सामाजिक विकास शाखा</option>
                        <option>आर्थिक प्रशासन शाखा</option>
                        <option>राजस्व शाखा</option>
                        <option>कृषि शाखा</option>
                        <option>स्वास्थ्य शाखा</option>
                        <option>प्रमुख प्रशासकीय अधिकृत</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <select id="status" class="form-select">
                        <option>Pending</option>
                        <option>In Progress</option>
                        <option>Completed</option>
                    </select>
                </div>

                <div class="col-md-5">
                    <input type="text" id="remarks" class="form-control" placeholder="Remarks">
                </div>

            </div>

            <div class="mt-3">
                <button class="btn btn-success" onclick="saveFile()">Save</button>
                <button class="btn btn-warning" onclick="updateFile()">Update</button>
            </div>

        </div>
    </div>

    <div class="card">

        <div class="card-header d-flex justify-content-between">

            <span>File Records</span>

            <input type="text"
                   id="search"
                   class="form-control w-25"
                   placeholder="Search..."
                   onkeyup="renderTable()">

        </div>

        <div class="card-body">

            <table class="table table-bordered">

                <thead>

                <tr>
                    <th>File No</th>
                    <th>Subject</th>
                    <th>Applicant</th>
                    <th>Branch</th>
                    <th>Status</th>
                    <th>Remarks</th>
                    <th>Action</th>
                </tr>

                </thead>

                <tbody id="fileTable"></tbody>

            </table>

        </div>

    </div>

</div>

<script>

let files = JSON.parse(localStorage.getItem("prmFiles")) || [];
let editIndex = -1;

function generateFileNo(){
    let num = files.length + 1;
    return "2082/083-" + String(num).padStart(4,'0');
}

document.getElementById("fileNo").value = generateFileNo();

function saveStorage(){
    localStorage.setItem("prmFiles", JSON.stringify(files));
}

function updateDashboard(){

    document.getElementById("totalFiles").innerText =
        files.length;

    document.getElementById("pendingFiles").innerText =
        files.filter(f=>f.status==="Pending").length;

    document.getElementById("completedFiles").innerText =
        files.filter(f=>f.status==="Completed").length;
}

function saveFile(){

    let obj = {

        fileNo:fileNo.value,
        subject:subject.value,
        applicant:applicant.value,
        mobile:mobile.value,
        branch:branch.value,
        status:status.value,
        remarks:remarks.value

    };

    if(subject.value===""){
        alert("Subject Required");
        return;
    }

    files.push(obj);

    saveStorage();
    renderTable();
    updateDashboard();

    document.getElementById("fileNo").value =
        generateFileNo();

    subject.value="";
    applicant.value="";
    mobile.value="";
    remarks.value="";
}

function renderTable(){

    let search =
        document.getElementById("search")
        .value
        .toLowerCase();

    let html="";

    files.forEach((f,index)=>{

        if(
            f.fileNo.toLowerCase().includes(search) ||
            f.subject.toLowerCase().includes(search)
        ){

            html += `
            <tr>
                <td>${f.fileNo}</td>
                <td>${f.subject}</td>
                <td>${f.applicant}</td>
                <td>${f.branch}</td>
                <td>${f.status}</td>
                <td>${f.remarks}</td>

                <td>

                    <button class="btn btn-sm btn-info"
                    onclick="editFile(${index})">
                    Edit
                    </button>

                    <button class="btn btn-sm btn-danger"
                    onclick="deleteFile(${index})">
                    Delete
                    </button>

                </td>

            </tr>
            `;
        }

    });

    document.getElementById("fileTable").innerHTML = html;
}

function editFile(index){

    let f = files[index];

    fileNo.value = f.fileNo;
    subject.value = f.subject;
    applicant.value = f.applicant;
    mobile.value = f.mobile;
    branch.value = f.branch;
    status.value = f.status;
    remarks.value = f.remarks;

    editIndex = index;
}

function updateFile(){

    if(editIndex === -1){
        alert("Select record first");
        return;
    }

    files[editIndex] = {

        fileNo:fileNo.value,
        subject:subject.value,
        applicant:applicant.value,
        mobile:mobile.value,
        branch:branch.value,
        status:status.value,
        remarks:remarks.value

    };

    saveStorage();
    renderTable();
    updateDashboard();

    editIndex = -1;
}

function deleteFile(index){

    if(confirm("Delete Record?")){

        files.splice(index,1);

        saveStorage();
        renderTable();
        updateDashboard();
    }
}

renderTable();
updateDashboard();

</script>

</body>
</html>
